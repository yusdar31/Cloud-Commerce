name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'packages/shared-go/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'packages/shared-go/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - user-service
          - product-service
          - api-gateway
          - store-service
          - inventory-service
          - order-service
          - payment-service
          - notification-service
          - review-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build shared-go
        working-directory: packages/shared-go
        run: |
          go mod download
          go build ./...

      - name: Build ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: |
          go mod download
          go build ./...

      - name: Vet ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: go vet ./...

      - name: Test ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: go test ./... -v -race -coverprofile=coverage.out
